<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="fname">first name</label> <!-- text --> 
        <input type="text" id="fname" name="fname" placeholder="enter your name" required><br><br>

        <label for="lname">last name</label> <!-- text -->
        <input type="text" name="lname" id="lname" placeholder="enter your last name" required> <br><br>

        <label for="email">your email</label> <!-- text -->
        <input type="text" name="email" id="email" placeholder="enter your email" required> <br><br>

        <label for="pas">password</label> <!-- password -->
        <input type="password" name="pas" id="pas" placeholder="enter your password" required><br><br>

        <label for="date">your date</label> <!-- დაბადების თარიღი -->
        <input type="date" name="date" id="date" placeholder="date" required><br><br>

        <label for="color">color</label> <!-- color -->
        <input type="color" name="color" id="color" placeholder="color" required> <br><br>

        <label for="checkbox">do you accept terms of use</label> <!-- checkbox -->
        <input type="checkbox" name="checkbox" id="checkbox" required>
        <button>submit</button>
    </form>

</body>
</html>
