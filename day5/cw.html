<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--  1) ახსენი რა არის form,label,input. -->
     <!-- form: ქმნის სარეგისტრაციო ფორმას
          label: 
          input: შემოაქვს სარეგისტრაციო გრაფა  -->

        <!-- 2) ახსენი რა არის type,id,required. -->
        <!-- type: მისი საშუალებით ვადგენთ თუ რა ჩაიწერება გრაფაში
             id: ის გამოიყენება input-ის label-თან დასაკავშირებლად
             required: submit-ის მიცემის შემთხვევაში გთხოვს სარეგისტრაციო გარფის შევსებას-->

             <!--  შექმენი სრულყოფილი სარეგისტრაციო ველი სადაც გექნება name,lastname,email,password და submit ღილაკი. -->

             <form>
                <label for="name">name</label>
                <input type="text" name="name" id="name" placeholder="enter yor name" required> <br><br>

                <label for="lname">lastname</label>
                <input type="text" name="lname" id="lname" placeholder="enter your last name" required> <br><br>

                <label for="email">email</label>
                <input type="text" name="name" id="name" placeholder="enter your email" required> <br><br>

                <label for="pas">password</label>
                <input type="password" name="pas" id="pas" placeholder="enter your password" required> <br><br>

                <button>submit</button>
             </form>
</body>
</html>
