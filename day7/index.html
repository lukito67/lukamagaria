<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul style="list-style-type: none;"> <!-- ul ქმნის unordered ლისტს -->
        <li>1</li> <!-- li ში ვწერთ ლისტის მონაცემებს -->
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>
    <ol style="list-style-type:georgian;"> <!-- ol ქმნის order ლისტს -->
        <li>hi</li> <!-- li ში ვწერთ ლისტის მონაცემებს -->
        <li>hi2</li>
        <li>hi3</li>
        <li>hi4</li>
        <li>hi5</li>
    </ol>
    <b>luka</b><br> <!-- ამუქებს  -->
    <i>luka</i><br> <!-- დახრის ჩაწერილ ელემენტს-->
    <u>luka</u> <br> <!-- ქვედა ხაზი გაუსვა -->
</body>
</html>
